<?xml version="1.0" encoding="UTF-8"?>
<!--
  CoCo Super Intelligence — Open Graph / social card (1200x630)
  One mark, one name, one phrase. Generous space, no stat dump.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="intelligence" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C2A8FF"/>
      <stop offset="50%" stop-color="#7FB8FF"/>
      <stop offset="100%" stop-color="#A6F0CD"/>
    </linearGradient>
  </defs>

  <!-- Background: deep midnight, not pure black -->
  <rect x="0" y="0" width="1200" height="630" fill="#0A0F1F"/>

  <!-- Mark on left: the original CoCo two-C arcs, scaled up -->
  <g transform="translate(120, 150)">
    <path d="M 145 100 A 100 100 0 1 0 145 300"
          stroke="#FFFFFF" stroke-width="22" stroke-linecap="round" fill="none"/>
    <path d="M 195 100 A 100 100 0 1 1 195 300"
          stroke="url(#intelligence)" stroke-width="22" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Right: name + subtitle + one phrase -->
  <text x="470" y="285"
        font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="128" font-weight="700" fill="#FFFFFF" letter-spacing="-6">CoCo</text>

  <text x="474" y="345"
        font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="33" font-weight="600" fill="url(#intelligence)" letter-spacing="6">SUPER INTELLIGENCE</text>

  <text x="472" y="436"
        font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="34" font-weight="500" fill="#FFFFFF" opacity="0.86">An advisory board of 389 world-class</text>
  <text x="472" y="482"
        font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="34" font-weight="500" fill="#FFFFFF" opacity="0.86">minds — inside your coding session.</text>

  <!-- Bottom-right URL -->
  <text x="1120" y="596"
        font-family="'SF Mono', 'Menlo', 'Monaco', monospace"
        font-size="22" fill="#FFFFFF" opacity="0.5" text-anchor="end">github.com/coco-research/coco</text>
</svg>
